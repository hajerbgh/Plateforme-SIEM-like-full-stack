version: "3.9"

services:

  backend:
    build: ./backend
    container_name: threatvision-backend
    ports:
      - "8000:8000"
    volumes:
      # Persist SQLite database and trained ML model between restarts
      - threatvision-data:/app/data
    environment:
      - DATABASE_URL=sqlite:////app/data/threatvision.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: threatvision-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  threatvision-data:
